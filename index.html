<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> RPG </title>
    <script src="script.js" defer> </script>
    <link href="style.css" rel="stylesheet">
    </head>
<body>
    
    <div id="log">
        <form name="introForm">
            <label>Name:</label>
            <input name="username" placeholder="Choose Your Name, Weapon">
            <label>Starting Strength:</label>
            <input name="atk" value="10" type="number" min="10" max="20">
            <button> Start Game </button>
        </form>
    </div>


    <div id="stats"> 
        <p id="playerName"></p>
        <p id="playerHealth"></p>
        <p id="playerAtkPower"></p>
        <p id="playerSpeed"></p>
        <p id="playerPotion"></p>
    </div>

    <div id="enemyStats">
        <p id="enemyName"></p>
        <p id="enemyHealth"></p>
        <p id="enemyAtkPower"></p>
        <p id="enemySpeed"></p>
        <!-- <p id="enemyPotion"></p> -->
    </div>

    <div id="buttons">
        <button id="moveBtn"> Move </button>
        <button id="attackBtn"> Attack </button>
        <button id="runBtn"> Run </button>
        <button id="healBtn"> Heal </button>
    </div>

</body>
</html>
